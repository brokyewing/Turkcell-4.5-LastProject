server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      routes:
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/api/books/**,/api/authors/**,/api/categories/**,/api/copybooks/**
        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/api/loans/**,/api/borrow/**
        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/api/members/**,/api/students/**,/api/departments/**
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/reservations/**
        - id: fine-service
          uri: lb://fine-service
          predicates:
            - Path=/api/fines/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://discovery-server:8761/eureka/}
  instance:
    prefer-ip-address: false

